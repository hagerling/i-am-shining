<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg-glow" cx="35%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#2a1505"/>
      <stop offset="100%" stop-color="#0c0700"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#daa520"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="gold-text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="40%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#daa520"/>
    </linearGradient>
    <radialGradient id="glow-spot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#daa520" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#daa520" stop-opacity="0"/>
    </radialGradient>
    <!-- Disco ball tile pattern -->
    <pattern id="disco-tiles" width="28" height="22" patternUnits="userSpaceOnUse">
      <rect x="1" y="1" width="26" height="20" fill="rgba(218,165,32,0.12)" rx="2"/>
    </pattern>
    <clipPath id="ball">
      <circle cx="980" cy="120" r="200"/>
    </clipPath>
    <radialGradient id="ball-grad" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="40%" stop-color="#daa520" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0c0700" stop-opacity="0.7"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-glow)"/>

  <!-- Ambient glow -->
  <ellipse cx="400" cy="380" rx="600" ry="350" fill="url(#glow-spot)"/>

  <!-- Disco ball (upper right) -->
  <circle cx="980" cy="120" r="200" fill="#1a0f02"/>
  <rect x="780" y="-80" width="400" height="400" fill="url(#disco-tiles)" clip-path="url(#ball)"/>
  <circle cx="980" cy="120" r="200" fill="url(#ball-grad)"/>
  <ellipse cx="920" cy="65" rx="55" ry="32" fill="white" opacity="0.12" transform="rotate(-15 920 65)"/>

  <!-- Left accent line -->
  <line x1="80" y1="315" x2="80" y2="315" stroke="url(#gold)" stroke-width="0" opacity="0"/>
  <rect x="80" y="200" width="2" height="230" fill="url(#gold)" opacity="0.4" rx="1"/>

  <!-- Badge label -->
  <text x="110" y="228" font-family="'DM Sans', system-ui, sans-serif" font-size="18" font-weight="600" letter-spacing="6" fill="#daa520" opacity="0.9">#SHINING</text>

  <!-- Main headline -->
  <text x="106" y="328" font-family="Georgia, 'Times New Roman', serif" font-size="100" font-weight="400" font-style="italic" fill="url(#gold-text)">I am Shining</text>

  <!-- Subline -->
  <text x="112" y="390" font-family="'DM Sans', system-ui, sans-serif" font-size="24" fill="#a08050" letter-spacing="1">Upload your photo · Apply the frame · Download your glow</text>

  <!-- URL -->
  <text x="112" y="560" font-family="'DM Sans', system-ui, sans-serif" font-size="18" fill="#b8860b" opacity="0.6" letter-spacing="1">hagerling.se/shining</text>

  <!-- Sparkle star mark (bottom right) -->
  <g transform="translate(1100, 530)">
    <path d="M0 -28 L3.5 -3.5 L28 0 L3.5 3.5 L0 28 L-3.5 3.5 L-28 0 L-3.5 -3.5 Z" fill="url(#gold)" opacity="0.7"/>
  </g>
  <g transform="translate(1150, 490)">
    <path d="M0 -14 L1.8 -1.8 L14 0 L1.8 1.8 L0 14 L-1.8 1.8 L-14 0 L-1.8 -1.8 Z" fill="url(#gold)" opacity="0.45"/>
  </g>

  <!-- Bottom gold line -->
  <rect x="0" y="622" width="1200" height="2" fill="url(#gold)" opacity="0.3"/>
</svg>
