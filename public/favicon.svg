<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="g" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="55%" stop-color="#daa520"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <radialGradient id="bg-dark" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#241505"/>
      <stop offset="100%" stop-color="#0c0700"/>
    </radialGradient>
    <radialGradient id="bg-light" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#fffbf0"/>
      <stop offset="100%" stop-color="#fef3d0"/>
    </radialGradient>
  </defs>

  <!-- Background: dark by default, light in light mode -->
  <rect width="100" height="100" rx="20" fill="url(#bg-dark)" class="bg"/>

  <!-- 4-pointed sparkle star ✦ -->
  <path d="M50 8 L54.5 43.5 L88 50 L54.5 56.5 L50 92 L45.5 56.5 L12 50 L45.5 43.5 Z" fill="url(#g)"/>

  <!-- Small accent dots -->
  <circle cx="79" cy="21" r="3.5" fill="url(#g)" opacity="0.75"/>
  <circle cx="21" cy="79" r="2.5" fill="url(#g)" opacity="0.55"/>

  <style>
    .bg { fill: url(#bg-dark); }
    @media (prefers-color-scheme: light) {
      .bg { fill: url(#bg-light); }
    }
  </style>
</svg>
