name: Deploy

on:
  push:
    branches: [main, staging]
  workflow_dispatch:

concurrency:
  # One deploy per branch at a time. New pushes cancel an in-flight build
  # so we never race two FTP uploads against the same directory.
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        if: github.ref == 'refs/heads/main'
        run: npm run build

      - name: Build (staging)
        if: github.ref == 'refs/heads/staging'
        run: npm run build:staging

      - name: Deploy to production
        if: github.ref == 'refs/heads/main'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftpcluster.loopia.se
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /i-am-shining.com/public_html/
          # Don't wipe staging on prod deploys, and don't sync junk.
          exclude: |
            **/.DS_Store
            **/.git*
            staging/**

      - name: Deploy to staging
        if: github.ref == 'refs/heads/staging'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftpcluster.loopia.se
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /i-am-shining.com/public_html/staging/
          exclude: |
            **/.DS_Store
            **/.git*

      - name: Summary
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "::notice::Deployed to https://i-am-shining.com"
          else
            echo "::notice::Deployed to https://i-am-shining.com/staging/"
          fi
